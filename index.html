<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ LENDA PIXEL · 100 ITENS</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
      user-select: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    body {
      min-height: 100vh;
      background: #0a0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      background: #1a1e2a;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 0 0 4px #4a6a8a, inset 0 0 0 2px #8ab0d0;
      position: relative;
    }
    canvas {
      display: block;
      margin: 0 auto;
      width: 800px;
      height: 600px;
      box-shadow: 0 0 0 4px #2a3a4a;
      image-rendering: crisp-edges;
      background: #1a2a2a;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      margin: 16px 8px 0 8px;
      color: #e8f0ff;
      text-shadow: 3px 3px 0 #0a1018;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .hp-box {
      background: #1e2a38;
      padding: 8px 25px;
      border-radius: 40px;
      border-bottom: 4px solid #b14e4e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .score-box {
      background: #1e2a38;
      padding: 8px 30px;
      border-radius: 40px;
      border-bottom: 4px solid #eab853;
    }
    .button-group {
      display: flex;
      gap: 12px;
    }
    .pixel-btn {
      background: #3a506c;
      border: none;
      border-bottom: 5px solid #1f2a38;
      color: white;
      font-family: inherit;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0f1a22, 0 0 10px #5f9fcf;
      transition: 0.05s;
      animation: btnGlow 2s infinite alternate;
    }
    .pixel-btn:hover {
      background: #5b7a9a;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #0f1a22, 0 0 18px #8fcbff;
    }
    .pixel-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0f1a22, 0 0 12px #8fcbff;
    }
    @keyframes btnGlow {
      0% { box-shadow: 0 4px 0 #0f1a22, 0 0 5px #5f9fcf; }
      100% { box-shadow: 0 4px 0 #0f1a22, 0 0 15px #a0d0ff; }
    }
    .controls-tip {
      color: #b0c8e0;
      margin-top: 12px;
      text-align: center;
      font-size: 0.9rem;
    }
    /* MENU PRINCIPAL */
    .menu-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .menu-box {
      background: #1e2a38;
      border: 6px solid #6d9fc0;
      padding: 40px 60px;
      border-radius: 50px;
      box-shadow: 0 0 50px #3a6a9a;
      text-align: center;
      color: #f0e8d0;
      animation: menuPop 0.3s;
    }
    @keyframes menuPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .menu-box h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      text-shadow: 6px 6px 0 #0a1420;
      color: #ffd966;
    }
    .menu-btn {
      display: block;
      width: 100%;
      margin: 15px 0;
      padding: 15px 0;
      font-size: 1.8rem;
    }
    /* INVENTÁRIO OVERLAY */
    .inventory-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 150;
      backdrop-filter: blur(4px);
    }
    .inventory-panel {
      background: #1e2a38;
      border: 6px solid #7a9fc0;
      padding: 25px 35px;
      border-radius: 40px;
      box-shadow: 0 0 40px #2a5a7a;
      color: #e8dcc0;
      max-width: 900px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .inv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #5a7a9a;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
    }
    .item-card {
      background: #15202b;
      border: 2px solid #3a6a8a;
      border-radius: 16px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
      animation: cardGlow 3s infinite alternate;
    }
    .item-card:hover {
      border-color: #b0d0ff;
      box-shadow: 0 0 18px #8fcbff;
      transform: scale(1.02);
    }
    @keyframes cardGlow {
      0% { box-shadow: 0 0 2px #4a8ab0; }
      100% { box-shadow: 0 0 10px #6ab0e0; }
    }
    .item-icon-canvas {
      width: 48px;
      height: 48px;
      margin: 0 auto;
    }
    .item-name {
      font-size: 12px;
      font-weight: bold;
      margin-top: 5px;
      color: #d0e0f0;
    }
    .item-count {
      font-size: 14px;
      background: #0f1a24;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .detail-panel {
      margin-top: 25px;
      background: #0f1a24;
      border-radius: 20px;
      padding: 18px;
      border-left: 6px solid #eab853;
    }
    .detail-name {
      font-size: 1.8rem;
      color: #ffd966;
    }
    .detail-lore {
      font-style: italic;
      color: #b0c0d0;
      margin: 8px 0;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="300"></canvas>
  
  <div class="status-bar">
    <div class="hp-box">
      <span>❤️</span> <span id="hpDisplay">20</span>
    </div>
    <div class="score-box">
      <span>⭐</span> <span id="scoreDisplay">0</span>
    </div>
    <div class="button-group">
      <button class="pixel-btn" id="inventoryBtn">📦 Inventário</button>
      <button class="pixel-btn" id="menuBtn">☰ Menu</button>
    </div>
  </div>
  <div class="controls-tip">
    WASD / Setas | ESPAÇO atacar | E interagir (usar poção) | Mapa explorável
  </div>
</div>

<!-- MENU PRINCIPAL -->
<div class="menu-overlay" id="mainMenu">
  <div class="menu-box">
    <h1>✨ LENDA PIXEL</h1>
    <button class="pixel-btn menu-btn" id="startGameBtn">▶ JOGAR</button>
    <button class="pixel-btn menu-btn" id="menuInventoryBtn">🎒 INVENTÁRIO</button>
    <button class="pixel-btn menu-btn" id="creditsBtn">📜 CRÉDITOS</button>
  </div>
</div>

<!-- INVENTÁRIO DETALHADO -->
<div class="inventory-overlay" id="inventoryOverlay">
  <div class="inventory-panel">
    <div class="inv-header">
      <h2>🎒 INVENTÁRIO (130 itens)</h2>
      <button class="pixel-btn" id="closeInvBtn">Fechar</button>
    </div>
    <div class="inv-grid" id="invGrid"></div>
    <div class="detail-panel" id="itemDetail">
      <div class="detail-name">Selecione um item</div>
      <div class="detail-lore">...</div>
      <div><span id="detailDesc"></span></div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- CONFIGURAÇÃO -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // UI elements
    const hpSpan = document.getElementById('hpDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');
    const mainMenu = document.getElementById('mainMenu');
    const inventoryOverlay = document.getElementById('inventoryOverlay');
    const invGrid = document.getElementById('invGrid');
    const detailName = document.querySelector('.detail-name');
    const detailLore = document.querySelector('.detail-lore');
    const detailDesc = document.getElementById('detailDesc');

    // Estado do jogo
    let gameActive = false;
    let gameOver = false;
    let winFlag = false;
    
    // ----- MAPA (20x15) -----
    const TILE_SIZE = 32;
    const MAP_COLS = 20;
    const MAP_ROWS = 15;
    const TILE_GRASS = 0, TILE_WALL = 1, TILE_WATER = 2;
    
    const tileMap = [];
    for (let row = 0; row < MAP_ROWS; row++) {
      tileMap[row] = [];
      for (let col = 0; col < MAP_COLS; col++) {
        if (row === 0 || row === MAP_ROWS-1 || col === 0 || col === MAP_COLS-1) tileMap[row][col] = TILE_WALL;
        else tileMap[row][col] = TILE_GRASS;
      }
    }
    // Decoração
    tileMap[3][5] = TILE_WATER; tileMap[3][6] = TILE_WATER; tileMap[4][5] = TILE_WATER;
    tileMap[7][10] = TILE_WALL; tileMap[7][11] = TILE_WALL; tileMap[8][10] = TILE_WALL;
    tileMap[10][4] = TILE_WATER; tileMap[11][4] = TILE_WATER; tileMap[11][5] = TILE_WATER;
    
    // Câmera
    let camera = { x: 0, y: 0 };
    const VIEW_W = 12, VIEW_H = 9;
    
    // Jogador
    let player = {
      x: 5*32+16, y: 5*32+16, size: 24,
      health: 20, maxHealth: 20,
      facing: 'down', attackTimer: 0, invincible: 0,
      speed: 2.8
    };
    
    // Inimigos (burros)
    let enemies = [];
    // Itens no chão
    let groundItems = [];
    
    // ----- BANCO DE ITENS (130 itens com lore) -----
    const ITEM_DB = [];
    function generateItemDatabase(count = 130) {
      const prefixes = ['Velho', 'Místico', 'Sombrio', 'Brilhante', 'Antigo', 'Élfico', 'Anão', 'Dracônico', 'Celestial', 'Abissal'];
      const types = ['Espada', 'Poção', 'Amuleto', 'Anel', 'Cajado', 'Armadura', 'Botas', 'Luva', 'Capa', 'Orbe'];
      const suffixes = ['da Lua', 'do Destino', 'Sombria', 'de Fogo', 'Gélida', 'do Caos', 'da Luz', 'Perdida', 'do Vazio', 'Eterna'];
      const rarities = ['Comum', 'Incomum', 'Raro', 'Épico', 'Lendário'];
      
      for (let i = 0; i < count; i++) {
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const type = types[Math.floor(Math.random() * types.length)];
        const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
        const name = `${prefix} ${type} ${suffix}`;
        const rarity = rarities[Math.floor(Math.random() * rarities.length)];
        const lore = `"Forjado em eras esquecidas, carrega o poder ${rarity.toLowerCase()}."`;
        const desc = type === 'Poção' ? 'Restaura 4 HP quando usado.' : 'Item valioso.';
        ITEM_DB.push({
          id: i, name, rarity, lore, desc, iconType: type
        });
      }
    }
    generateItemDatabase(130);
    
    // Inventário (Map id -> quantidade)
    let inventory = new Map();
    
    // Pontuação
    let score = 0;
    
    // Cooldown ataque
    const ATTACK_COOLDOWN = 18;
    const ATTACK_DURATION = 8;
    
    // Controles
    const keys = {
      w: false, a: false, s: false, d: false,
      up: false, left: false, down: false, right: false,
      space: false, e: false
    };
    
    // ----- FUNÇÕES AUXILIARES -----
    function isTileSolid(col, row) {
      if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return true;
      return tileMap[row][col] !== TILE_GRASS;
    }
    function canMoveTo(x, y, w, h) {
      const left = Math.floor((x - w/2) / TILE_SIZE);
      const right = Math.floor((x + w/2 - 1) / TILE_SIZE);
      const top = Math.floor((y - h/2) / TILE_SIZE);
      const bottom = Math.floor((y + h/2 - 1) / TILE_SIZE);
      for (let row = top; row <= bottom; row++) {
        for (let col = left; col <= right; col++) {
          if (isTileSolid(col, row)) return false;
        }
      }
      return true;
    }
    function updateCamera() {
      camera.x = Math.max(0, Math.min(player.x - (VIEW_W/2)*TILE_SIZE, (MAP_COLS - VIEW_W)*TILE_SIZE));
      camera.y = Math.max(0, Math.min(player.y - (VIEW_H/2)*TILE_SIZE, (MAP_ROWS - VIEW_H)*TILE_SIZE));
    }
    
    // ----- INICIALIZAÇÃO / RESET -----
    function spawnEnemies() {
      enemies = [
        { x: 8*32+16, y: 6*32+16, size:24, health:5, vx:0,vy:0 },
        { x: 14*32+16, y: 8*32+16, size:24, health:5, vx:0,vy:0 },
        { x: 4*32+16, y: 10*32+16, size:24, health:6, vx:0,vy:0 },
      ];
    }
    function giveStarterItems() {
      inventory.set(5, 2);
      inventory.set(12, 1);
      inventory.set(33, 3);
      inventory.set(67, 1);
    }
    function resetGame() {
      player = { x:5*32+16, y:5*32+16, size:24, health:20, maxHealth:20, facing:'down', attackTimer:0, invincible:0, speed:2.8 };
      score = 0;
      gameActive = true;
      gameOver = false;
      winFlag = false;
      inventory.clear();
      giveStarterItems();
      groundItems = [];
      spawnEnemies();
      updateUI();
      updateCamera();
      closeInventory();
    }
    function updateUI() {
      hpSpan.textContent = player.health;
      scoreSpan.textContent = score;
    }
    
    // ----- LÓGICA DO JOGO -----
    function handlePlayerMovement() {
      if (!gameActive || gameOver || player.health <= 0) return;
      let moveX = 0, moveY = 0;
      if (keys.w || keys.up) moveY -= 1;
      if (keys.s || keys.down) moveY += 1;
      if (keys.a || keys.left) moveX -= 1;
      if (keys.d || keys.right) moveX += 1;
      if (moveX !== 0 || moveY !== 0) {
        const len = Math.sqrt(moveX*moveX + moveY*moveY);
        moveX = moveX / len * player.speed;
        moveY = moveY / len * player.speed;
        if (Math.abs(moveX) > Math.abs(moveY)) player.facing = moveX > 0 ? 'right' : 'left';
        else player.facing = moveY > 0 ? 'down' : 'up';
      }
      if (canMoveTo(player.x + moveX, player.y, player.size, player.size)) player.x += moveX;
      if (canMoveTo(player.x, player.y + moveY, player.size, player.size)) player.y += moveY;
      
      // Coleta automática de itens
      for (let i=groundItems.length-1; i>=0; i--) {
        const g = groundItems[i];
        if (Math.hypot(player.x - g.x, player.y - g.y) < 22) {
          inventory.set(g.itemId, (inventory.get(g.itemId) || 0) + 1);
          groundItems.splice(i,1);
        }
      }
    }
    
    function handleAttack() {
      if (player.attackTimer > 0) player.attackTimer--;
      if (keys.space && player.attackTimer <= 0 && gameActive && !gameOver && player.health > 0) {
        player.attackTimer = ATTACK_COOLDOWN;
        let ax = player.x, ay = player.y, range = 40;
        if (player.facing === 'right') ax += range/2;
        if (player.facing === 'left') ax -= range/2;
        if (player.facing === 'down') ay += range/2;
        if (player.facing === 'up') ay -= range/2;
        
        for (let i=enemies.length-1; i>=0; i--) {
          const e = enemies[i];
          if (Math.hypot(e.x - ax, e.y - ay) < 28) {
            e.health -= 2;
            if (e.health <= 0) {
              const dropId = Math.floor(Math.random() * ITEM_DB.length);
              groundItems.push({ x: e.x, y: e.y, itemId: dropId });
              enemies.splice(i,1);
              score += 10;
              updateUI();
            }
          }
        }
      }
    }
    
    function usePotion() {
      if (!gameActive || gameOver) return;
      // Procura primeira poção no inventário (tipo Poção)
      for (let [id, qty] of inventory.entries()) {
        const item = ITEM_DB[id];
        if (item && item.iconType === 'Poção' && qty > 0 && player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 4);
          inventory.set(id, qty - 1);
          if (inventory.get(id) === 0) inventory.delete(id);
          updateUI();
          break;
        }
      }
    }
    
    function updateEnemies() {
      for (let e of enemies) {
        if (Math.random() < 0.7) {
          e.vx = (Math.random()-0.5)*1.2; e.vy = (Math.random()-0.5)*1.2;
        } else {
          const dx = player.x - e.x, dy = player.y - e.y, dist = Math.hypot(dx,dy);
          if (dist > 5) { e.vx = dx/dist*1.0; e.vy = dy/dist*1.0; }
        }
        if (canMoveTo(e.x + e.vx, e.y, e.size, e.size)) e.x += e.vx;
        if (canMoveTo(e.x, e.y + e.vy, e.size, e.size)) e.y += e.vy;
        
        if (gameActive && !gameOver && player.invincible <= 0 && Math.hypot(player.x-e.x, player.y-e.y) < 28) {
          player.health = Math.max(0, player.health-1);
          player.invincible = 30;
          updateUI();
          if (player.health <= 0) { gameActive = false; gameOver = true; }
        }
      }
      if (player.invincible > 0) player.invincible--;
      if (enemies.length === 0 && gameActive) { winFlag = true; gameActive = false; gameOver = true; }
    }
    
    // ----- DESENHO (PIXEL ART) -----
    function drawMap() {
      const startCol = Math.floor(camera.x / TILE_SIZE);
      const endCol = startCol + VIEW_W;
      const startRow = Math.floor(camera.y / TILE_SIZE);
      const endRow = startRow + VIEW_H;
      for (let row = startRow; row <= endRow; row++) {
        for (let col = startCol; col <= endCol; col++) {
          if (row < 0 || row >= MAP_ROWS || col < 0 || col >= MAP_COLS) continue;
          const x = col * TILE_SIZE - camera.x;
          const y = row * TILE_SIZE - camera.y;
          const tile = tileMap[row][col];
          if (tile === TILE_GRASS) {
            ctx.fillStyle = '#3a754a'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#4f9a5e'; ctx.fillRect(x+4, y+8, 6, 6);
          } else if (tile === TILE_WALL) {
            ctx.fillStyle = '#6b5a4e'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#8b7a6a'; ctx.fillRect(x+4, y+4, 8, 8);
          } else if (tile === TILE_WATER) {
            ctx.fillStyle = '#2a6f9c'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#5fa9d0'; ctx.fillRect(x+6, y+10, 4, 4);
          }
        }
      }
    }
    
    // Desenha ícone do item em um canvas (usado no inventário)
    function drawItemIcon(ctx, itemId, size) {
      const item = ITEM_DB[itemId] || { iconType: 'Poção', rarity: 'Comum' };
      ctx.clearRect(0, 0, size, size);
      ctx.shadowBlur = 0;
      if (item.iconType.includes('Espada')) {
        ctx.fillStyle = '#c0c0c0'; ctx.fillRect(size/2-2, 4, 4, size-8);
        ctx.fillStyle = '#a0a0a0'; ctx.fillRect(size/2-6, 4, 4, 6);
      } else if (item.iconType.includes('Poção')) {
        ctx.fillStyle = '#7a4dad'; ctx.fillRect(size/2-4, 4, 8, size-8);
        ctx.fillStyle = '#e0c0ff'; ctx.fillRect(size/2-2, 6, 4, size-12);
      } else {
        ctx.fillStyle = '#d0a030'; ctx.beginPath(); ctx.arc(size/2, size/2, size/3, 0, 2*Math.PI); ctx.fill();
      }
      // Brilho por raridade
      if (item.rarity === 'Lendário') ctx.shadowColor = '#ffd700';
      else if (item.rarity === 'Épico') ctx.shadowColor = '#a0a0ff';
      else ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 8;
    }
    
    function drawGroundItems() {
      for (let g of groundItems) {
        const sx = g.x - camera.x - 8;
        const sy = g.y - camera.y - 8;
        ctx.save();
        ctx.translate(sx, sy);
        drawItemIcon(ctx, g.itemId, 16);
        ctx.restore();
      }
    }
    
    function drawPlayer() {
      const px = player.x - camera.x - 16;
      const py = player.y - camera.y - 16;
      ctx.fillStyle = player.invincible % 6 < 3 ? '#d4b47a' : '#f0d0a0';
      ctx.fillRect(px+8, py+4, 16, 20);
      ctx.fillStyle = '#3a2a1a'; ctx.fillRect(px+6, py, 20, 8);
      // Olhos
      ctx.fillStyle = '#111';
      if (player.facing === 'right') { ctx.fillRect(px+20, py+8, 4, 4); ctx.fillRect(px+12, py+8, 4, 4); }
      else if (player.facing === 'left') { ctx.fillRect(px+8, py+8, 4, 4); ctx.fillRect(px+16, py+8, 4, 4); }
      else { ctx.fillRect(px+10, py+8, 4, 4); ctx.fillRect(px+18, py+8, 4, 4); }
      // Espada
      if (player.attackTimer > ATTACK_COOLDOWN - ATTACK_DURATION) {
        ctx.fillStyle = '#c0c0c0';
        if (player.facing === 'right') ctx.fillRect(px+24, py+6, 20, 6);
        else if (player.facing === 'left') ctx.fillRect(px-12, py+6, 20, 6);
        else if (player.facing === 'down') ctx.fillRect(px+6, py+24, 6, 20);
        else ctx.fillRect(px+6, py-12, 6, 20);
      }
    }
    
    function drawEnemies() {
      for (let e of enemies) {
        const ex = e.x - camera.x - 16, ey = e.y - camera.y - 16;
        ctx.fillStyle = '#b33'; ctx.fillRect(ex+8, ey+4, 16, 18);
        ctx.fillStyle = '#2a1a0a'; ctx.fillRect(ex+6, ey, 20, 6);
        ctx.fillStyle = '#f00'; ctx.fillRect(ex+10, ey+8, 4, 4); ctx.fillRect(ex+18, ey+8, 4, 4);
      }
    }
    
    function drawUIOverlay() {
      if (!gameActive && gameOver) {
        ctx.font = 'bold 24px "Courier New", monospace';
        ctx.fillStyle = '#ffe0b0';
        ctx.shadowColor = '#0a0a1a'; ctx.shadowBlur = 10;
        ctx.fillText(winFlag ? 'VITÓRIA!' : 'GAME OVER', 120, 150);
        ctx.shadowBlur = 0;
      }
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMap();
      drawGroundItems();
      drawEnemies();
      drawPlayer();
      drawUIOverlay();
    }
    
    // ----- INVENTÁRIO UI -----
    function renderInventoryGrid() {
      invGrid.innerHTML = '';
      for (let [id, qty] of inventory.entries()) {
        const item = ITEM_DB[id];
        if (!item) continue;
        const card = document.createElement('div');
        card.className = 'item-card';
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 48;
        canvas.className = 'item-icon-canvas';
        const ictx = canvas.getContext('2d');
        drawItemIcon(ictx, id, 48);
        card.appendChild(canvas);
        const nameSpan = document.createElement('div');
        nameSpan.className = 'item-name';
        nameSpan.textContent = item.name.substring(0, 12);
        card.appendChild(nameSpan);
        const countSpan = document.createElement('div');
        countSpan.className = 'item-count';
        countSpan.textContent = qty;
        card.appendChild(countSpan);
        
        card.addEventListener('click', () => {
          detailName.textContent = item.name;
          detailLore.textContent = item.lore;
          detailDesc.textContent = item.desc;
        });
        invGrid.appendChild(card);
      }
    }
    
    function openInventory() {
      renderInventoryGrid();
      inventoryOverlay.style.display = 'flex';
    }
    function closeInventory() {
      inventoryOverlay.style.display = 'none';
    }
    
    // ----- MENU -----
    function showMenu() {
      mainMenu.style.display = 'flex';
    }
    function hideMenu() {
      mainMenu.style.display = 'none';
    }
    
    // ----- LOOP -----
    function gameLoop() {
      if (gameActive) {
        handlePlayerMovement();
        handleAttack();
        updateEnemies();
        updateCamera();
        if (keys.e) { usePotion(); keys.e = false; } // evita spam
      }
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // ----- EVENTOS -----
    function handleKeyDown(e) {
      const key = e.key.toLowerCase();
      if (key === 'w' || key === 'arrowup') keys.up = true;
      if (key === 's' || key === 'arrowdown') keys.down = true;
      if (key === 'a' || key === 'arrowleft') keys.left = true;
      if (key === 'd' || key === 'arrowright') keys.right = true;
      if (key === ' ') { keys.space = true; e.preventDefault(); }
      if (key === 'e') { keys.e = true; e.preventDefault(); }
      if (key === 'w') keys.w = true;
      if (key === 's') keys.s = true;
      if (key === 'a') keys.a = true;
      if (key === 'd') keys.d = true;
      if (['arrowup','arrowdown','arrowleft','arrowright',' ', 'e'].includes(key)) e.preventDefault();
    }
    function handleKeyUp(e) {
      const key = e.key.toLowerCase();
      if (key === 'w' || key === 'arrowup') keys.up = false;
      if (key === 's' || key === 'arrowdown') keys.down = false;
      if (key === 'a' || key === 'arrowleft') keys.left = false;
      if (key === 'd' || key === 'arrowright') keys.right = false;
      if (key === ' ') keys.space = false;
      if (key === 'e') keys.e = false;
      if (key === 'w') keys.w = false;
      if (key === 's') keys.s = false;
      if (key === 'a') keys.a = false;
      if (key === 'd') keys.d = false;
      if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(key)) e.preventDefault();
    }
    
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    
    // Botões
    document.getElementById('inventoryBtn').addEventListener('click', openInventory);
    document.getElementById('menuBtn').addEventListener('click', showMenu);
    document.getElementById('closeInvBtn').addEventListener('click', closeInventory);
    document.getElementById('startGameBtn').addEventListener('click', () => {
      hideMenu();
      resetGame();
    });
    document.getElementById('menuInventoryBtn').addEventListener('click', () => {
      hideMenu();
      openInventory();
    });
    document.getElementById('creditsBtn').addEventListener('click', () => {
      alert('✨ Lenda Pixel\nCriado com 130 itens únicos.\nDivirta-se!');
    });
    
    // Fechar inventário clicando fora (no overlay)
    inventoryOverlay.addEventListener('click', (e) => {
      if (e.target === inventoryOverlay) closeInventory();
    });
    mainMenu.addEventListener('click', (e) => {
      if (e.target === mainMenu) hideMenu();
    });
    
    // Iniciar com menu aberto
    showMenu();
    // Pré-renderizar inventário
    renderInventoryGrid();
    // Loop
    gameLoop();
  })();
</script>
</body>
</html>
