<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚔️ ROGUELIKE · IA AVANÇADA</title>
  <style>
    /* (mantido o estilo anterior, com adição de opções de cabelo) */
    * {
      margin: 0; box-sizing: border-box; user-select: none;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    body {
      min-height: 100vh; background: #000; display: flex;
      justify-content: center; align-items: center;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      background: #1a1e2a; padding: 20px; border-radius: 30px;
      box-shadow: 0 0 0 4px #4a6a8a, inset 0 0 0 2px #8ab0d0;
    }
    canvas {
      display: block; margin: 0 auto; width: 800px; height: 600px;
      box-shadow: 0 0 0 4px #2a3a4a; image-rendering: crisp-edges;
      background: #000;
    }
    .status-bar {
      display: flex; justify-content: space-between; margin: 16px 8px 0 8px;
      color: #e8f0ff; text-shadow: 3px 3px 0 #0a1018;
      font-size: 1.2rem; font-weight: bold; gap: 10px; flex-wrap: wrap;
    }
    .hp-box, .weapon-box, .score-box, .wave-box, .stamina-box {
      background: #1e2a38; padding: 6px 16px; border-radius: 40px;
      border-bottom: 4px solid; display: flex; align-items: center; gap: 8px;
    }
    .hp-box { border-bottom-color: #b14e4e; }
    .weapon-box { border-bottom-color: #6a9fb0; }
    .score-box { border-bottom-color: #eab853; }
    .wave-box { border-bottom-color: #9f7eb0; }
    .stamina-box { border-bottom-color: #6ab04c; }
    .button-group { display: flex; gap: 12px; }
    .pixel-btn {
      background: #3a506c; border: none; border-bottom: 5px solid #1f2a38;
      color: white; font-family: inherit; font-weight: bold; font-size: 1.0rem;
      padding: 6px 14px; border-radius: 30px; cursor: pointer;
      box-shadow: 0 4px 0 #0f1a22, 0 0 10px #5f9fcf;
      transition: 0.05s; animation: btnGlow 2s infinite alternate;
    }
    .pixel-btn:hover {
      background: #5b7a9a; transform: translateY(-2px);
      box-shadow: 0 6px 0 #0f1a22, 0 0 18px #8fcbff;
    }
    .pixel-btn:active {
      transform: translateY(2px); box-shadow: 0 2px 0 #0f1a22, 0 0 12px #8fcbff;
    }
    @keyframes btnGlow {
      0% { box-shadow: 0 4px 0 #0f1a22, 0 0 5px #5f9fcf; }
      100% { box-shadow: 0 4px 0 #0f1a22, 0 0 15px #a0d0ff; }
    }
    .controls-tip { color: #b0c8e0; margin-top: 12px; text-align: center; font-size: 0.9rem; }
    /* Overlays */
    .menu-overlay, .class-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; justify-content: center;
      align-items: center; z-index: 200;
    }
    .menu-box, .class-box {
      background: #0a0f18; border: 6px solid #6d9fc0; padding: 30px 50px;
      border-radius: 50px; box-shadow: 0 0 50px #3a6a9a; text-align: center;
      color: #f0e8d0; animation: menuPop 0.3s;
    }
    .class-options {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0;
    }
    .class-card {
      background: #1a2430; border: 3px solid #6d9fc0; border-radius: 20px;
      padding: 15px 10px; cursor: pointer; transition: 0.1s; width: 130px;
    }
    .class-card.selected {
      border-color: #ffd966; box-shadow: 0 0 20px #ffd966; transform: scale(1.05);
    }
    .inventory-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; justify-content: center;
      align-items: center; z-index: 150; backdrop-filter: blur(4px);
    }
    .inventory-panel {
      background: #1e2a38; border: 6px solid #7a9fc0; padding: 25px 35px;
      border-radius: 40px; box-shadow: 0 0 40px #2a5a7a; color: #e8dcc0;
      max-width: 900px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .inv-header { display: flex; justify-content: space-between; border-bottom: 2px solid #5a7a9a; padding-bottom: 10px; margin-bottom: 20px; }
    .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
    .item-card { background: #15202b; border: 2px solid #3a6a8a; border-radius: 16px; padding: 8px 4px; text-align: center; cursor: pointer; }
    .item-card:hover { border-color: #b0d0ff; box-shadow: 0 0 18px #8fcbff; }
    .item-icon-canvas { width: 48px; height: 48px; margin: 0 auto; background: #3a6a8a; }
    .item-name { font-size: 12px; font-weight: bold; margin-top: 5px; color: #d0e0f0; }
    .item-count { font-size: 14px; background: #0f1a24; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-top: 4px; }
    .color-option {
      display: inline-block; width: 40px; height: 40px; border-radius: 20px;
      margin: 5px; border: 3px solid transparent; cursor: pointer; transition: 0.1s;
    }
    .color-option.selected {
      border-color: #ffd966; box-shadow: 0 0 15px #ffd966; transform: scale(1.1);
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="300"></canvas>
  <div class="status-bar">
    <div class="hp-box"><span>❤️</span> <span id="hpDisplay">20</span></div>
    <div class="weapon-box"><span>⚔️</span> <span id="weaponDisplay">Espada</span></div>
    <div class="stamina-box"><span>🏃</span> <span id="staminaDisplay">100</span></div>
    <div class="wave-box"><span>🌊</span> Wave <span id="waveDisplay">1</span></div>
    <div class="score-box"><span>⭐</span> <span id="scoreDisplay">0</span></div>
    <div class="button-group">
      <button class="pixel-btn" id="inventoryBtn">📦 Inv</button>
      <button class="pixel-btn" id="menuBtn">☰ Menu</button>
    </div>
  </div>
  <div class="controls-tip">
    WASD/Setas | Espaço atacar | Shift Dash | E usar poção | 1-6 trocar arma
  </div>
</div>

<!-- MENU PRINCIPAL -->
<div class="menu-overlay" id="mainMenu">
  <div class="menu-box">
    <h1>✨ ROGUELIKE</h1>
    <button class="pixel-btn menu-btn" id="startGameBtn">▶ JOGAR</button>
    <button class="pixel-btn menu-btn" id="customizeBtn">🎨 PERSONALIZAR</button>
    <button class="pixel-btn menu-btn" id="creditsBtn">📜 CRÉDITOS</button>
    <div class="customize-panel" id="customizePanel" style="display:none; margin-top:20px;">
      <p>Cor da pele:</p>
      <div id="skinColors">
        <span class="color-option" style="background:#f0d0a0;" data-skin="#f0d0a0"></span>
        <span class="color-option" style="background:#d4b47a;" data-skin="#d4b47a"></span>
        <span class="color-option" style="background:#c49a6c;" data-skin="#c49a6c"></span>
        <span class="color-option" style="background:#e0b090;" data-skin="#e0b090"></span>
        <span class="color-option" style="background:#a67c52;" data-skin="#a67c52"></span>
      </div>
      <p>Cor da roupa:</p>
      <div id="clothesColors">
        <span class="color-option" style="background:#3a6ea5;" data-clothes="#3a6ea5"></span>
        <span class="color-option" style="background:#6b3a3a;" data-clothes="#6b3a3a"></span>
        <span class="color-option" style="background:#3a6b4a;" data-clothes="#3a6b4a"></span>
        <span class="color-option" style="background:#7a5a9e;" data-clothes="#7a5a9e"></span>
        <span class="color-option" style="background:#b07030;" data-clothes="#b07030"></span>
      </div>
      <p>Cor do cabelo:</p>
      <div id="hairColors">
        <span class="color-option" style="background:#3a2a1a;" data-hair="#3a2a1a"></span>
        <span class="color-option" style="background:#6a4a2a;" data-hair="#6a4a2a"></span>
        <span class="color-option" style="background:#1a1a2a;" data-hair="#1a1a2a"></span>
        <span class="color-option" style="background:#a05030;" data-hair="#a05030"></span>
        <span class="color-option" style="background:#c0c0a0;" data-hair="#c0c0a0"></span>
      </div>
      <button class="pixel-btn" id="saveCustomizeBtn" style="margin-top:15px;">Salvar</button>
    </div>
  </div>
</div>

<!-- SELEÇÃO DE CLASSE -->
<div class="class-overlay" id="classSelection" style="display: none;">
  <div class="class-box">
    <h2>⚔️ Escolha sua Classe</h2>
    <div class="class-options" id="classOptionsContainer"></div>
    <button class="pixel-btn" id="confirmClassBtn">Confirmar</button>
  </div>
</div>

<!-- INVENTÁRIO -->
<div class="inventory-overlay" id="inventoryOverlay">
  <div class="inventory-panel">
    <div class="inv-header">
      <h2>🎒 INVENTÁRIO</h2>
      <button class="pixel-btn" id="closeInvBtn">Fechar</button>
    </div>
    <div class="inv-grid" id="invGrid"></div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- CONFIGURAÇÃO -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // UI elements
    const hpSpan = document.getElementById('hpDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');
    const weaponSpan = document.getElementById('weaponDisplay');
    const waveSpan = document.getElementById('waveDisplay');
    const staminaSpan = document.getElementById('staminaDisplay');
    const mainMenu = document.getElementById('mainMenu');
    const classSelection = document.getElementById('classSelection');
    const customizePanel = document.getElementById('customizePanel');
    const inventoryOverlay = document.getElementById('inventoryOverlay');
    const invGrid = document.getElementById('invGrid');

    // Estado do jogo
    let gameActive = false;
    let gameOver = false;
    let playerClass = 'fighter'; 
    
    // Aparência do jogador (personalizável)
    let playerAppearance = { skin: '#f0d0a0', clothes: '#3a6ea5', hair: '#3a2a1a' };
    
    // Classes disponíveis (balanceadas)
    const CLASSES = {
      mage:      { name: 'Mago', maxHealth: 22, weapon: 'staff', armor: 0.9 },
      tank:      { name: 'Tank', maxHealth: 45, weapon: 'axe', armor: 0.7 },
      hunter:    { name: 'Caçador', maxHealth: 26, weapon: 'longbow', armor: 1.0 },
      fighter:   { name: 'Lutador', maxHealth: 32, weapon: 'broadsword', armor: 0.85 },
      jester:    { name: 'Bobo', maxHealth: 24, weapon: 'dagger', armor: 1.1 },
      monk:      { name: 'Monge', maxHealth: 30, weapon: 'spear', armor: 0.95 },
      psychic:   { name: 'Psíquico', maxHealth: 22, weapon: 'staff', armor: 1.0 },
      necromancer:{ name: 'Necromante', maxHealth: 26, weapon: 'staff', armor: 1.0 }
    };
    
    // Armas (dano balanceado)
    const weapons = {
      sword:      { name: 'Espada', damage: 4, cooldown: 18, range: 40, type: 'melee' },
      dagger:     { name: 'Adaga', damage: 3, cooldown: 10, range: 30, type: 'melee' },
      axe:        { name: 'Machado', damage: 7, cooldown: 28, range: 35, type: 'melee' },
      spear:      { name: 'Lança', damage: 5, cooldown: 20, range: 55, type: 'melee' },
      longbow:    { name: 'Arco Longo', damage: 4, cooldown: 22, range: 400, type: 'ranged', projectile: 'arrow' },
      staff:      { name: 'Cajado', damage: 6, cooldown: 32, range: 300, type: 'ranged', projectile: 'fireball' },
      broadsword: { name: 'Espada Larga', damage: 6, cooldown: 24, range: 45, type: 'melee' }
    };
    
    // Mapa fixo (arena)
    const TILE_SIZE = 32, MAP_COLS = 20, MAP_ROWS = 15;
    const TILE_GRASS = 0, TILE_WALL = 1;
    const tileMap = Array(MAP_ROWS).fill().map(() => Array(MAP_COLS).fill(TILE_GRASS));
    // Bordas e obstáculos
    for (let r=0; r<MAP_ROWS; r++) for (let c=0; c<MAP_COLS; c++) 
      if (r===0||r===MAP_ROWS-1||c===0||c===MAP_COLS-1) tileMap[r][c] = TILE_WALL;
    tileMap[5][6]=TILE_WALL; tileMap[5][7]=TILE_WALL; tileMap[6][6]=TILE_WALL;
    tileMap[10][12]=TILE_WALL; tileMap[10][13]=TILE_WALL; tileMap[11][12]=TILE_WALL;
    
    function isTileSolid(col, row) {
      if (col<0||col>=MAP_COLS||row<0||row>=MAP_ROWS) return true;
      return tileMap[row][col] === TILE_WALL;
    }
    function canMoveTo(x, y, w, h) {
      const left = Math.floor((x-w/2)/TILE_SIZE), right = Math.floor((x+w/2-1)/TILE_SIZE);
      const top = Math.floor((y-h/2)/TILE_SIZE), bottom = Math.floor((y+h/2-1)/TILE_SIZE);
      for (let r=top; r<=bottom; r++) for (let c=left; c<=right; c++) if (isTileSolid(c,r)) return false;
      return true;
    }
    
    let camera = { x: 0, y: 0 };
    function updateCamera() {
      camera.x = Math.max(0, Math.min(player.x - canvas.width/2, MAP_COLS*TILE_SIZE - canvas.width));
      camera.y = Math.max(0, Math.min(player.y - canvas.height/2, MAP_ROWS*TILE_SIZE - canvas.height));
    }
    
    // Jogador
    let player = {
      x: 10*32+16, y: 7*32+16, size: 24,
      health: 30, maxHealth: 30, armor: 1.0,
      stamina: 100, maxStamina: 100,
      facing: 'down', attackTimer: 0, invincible: 0,
      speed: 2.8, weapon: 'sword', dashCooldown: 0
    };
    
    // Sistema de waves
    let wave = 1, waveInProgress = false, bossSpawned = false;
    let enemies = [];
    let projectiles = [], groundItems = [];
    
    // Tipos de inimigos (com classes e IA melhorada)
    const ENEMY_TYPES = {
      slime:    { color: '#4aa', size: 24, health: 4,  speed: 0.8, damage: 2, ai: 'basic', class: null },
      skeleton: { color: '#ddd', size: 26, health: 7,  speed: 1.0, damage: 3, ai: 'chase', class: 'fighter' },
      bat:      { color: '#636', size: 20, health: 3,  speed: 1.6, damage: 2, ai: 'flank', class: null },
      archer:   { color: '#8a6', size: 24, health: 6,  speed: 0.9, damage: 4, ai: 'ranged', class: 'hunter', projectile: 'arrow' },
      mage:     { color: '#a5a', size: 24, health: 8,  speed: 0.8, damage: 6, ai: 'ranged', class: 'mage', projectile: 'fireball' },
      boss:     { color: '#b22', size: 52, health: 50, speed: 0.9, damage: 8, ai: 'boss', class: 'tank' }
    };
    
    // Banco de itens
    const ITEM_DB = [];
    for (let i=0; i<30; i++) ITEM_DB.push({ id: i, name: `Poção ${i}`, type: 'potion', heal: 15 + i*3 });
    for (let i=30; i<50; i++) ITEM_DB.push({ id: i, name: `Amuleto ${i-30}`, type: 'accessory' });
    
    let inventory = new Map();
    let score = 0;
    
    // Controles
    const keys = {
      w: false, a: false, s: false, d: false,
      up: false, left: false, down: false, right: false,
      space: false, e: false, shift: false
    };
    
    // ----- FUNÇÕES DE WAVE (com inimigos balanceados)-----
    function startWave() {
      waveInProgress = true;
      bossSpawned = (wave % 15 === 0);
      let count = bossSpawned ? 1 : 4 + wave * 2;
      
      for (let i=0; i<count; i++) {
        let type;
        if (bossSpawned) type = 'boss';
        else {
          const r = Math.random();
          if (r < 0.4) type = 'slime';
          else if (r < 0.7) type = 'skeleton';
          else if (r < 0.85) type = 'bat';
          else if (r < 0.95) type = 'archer';
          else type = 'mage';
        }
        const base = ENEMY_TYPES[type];
        let ex, ey;
        do {
          ex = 2*32 + Math.random()*(MAP_COLS-4)*TILE_SIZE;
          ey = 2*32 + Math.random()*(MAP_ROWS-4)*TILE_SIZE;
        } while (!canMoveTo(ex, ey, base.size, base.size) || Math.hypot(player.x-ex, player.y-ey) < 120);
        
        const healthMult = bossSpawned ? 1.5 : (1 + wave*0.15);
        enemies.push({
          x: ex, y: ey, size: base.size, health: Math.floor(base.health * healthMult),
          maxHealth: Math.floor(base.health * healthMult),
          vx: 0, vy: 0, type, color: base.color, speed: base.speed, damage: base.damage,
          ai: base.ai, class: base.class, projectile: base.projectile,
          attackCooldown: 0
        });
      }
      updateUI();
    }
    
    function nextWave() {
      wave++;
      startWave();
      updateUI();
    }
    
    function checkWaveComplete() {
      if (waveInProgress && enemies.length === 0) {
        waveInProgress = false;
        groundItems.push({ x: player.x + 40, y: player.y, itemId: Math.floor(Math.random() * ITEM_DB.length) });
        setTimeout(() => { if (!gameOver && gameActive) nextWave(); }, 2000);
      }
    }
    
    // Aplicar classe escolhida
    function applyClass() {
      const cls = CLASSES[playerClass];
      player.maxHealth = cls.maxHealth;
      player.health = cls.maxHealth;
      player.weapon = cls.weapon;
      player.armor = cls.armor;
    }
    
    function resetGame() {
      applyClass();
      player.x = 10*32+16; player.y = 7*32+16;
      player.attackTimer = 0; player.invincible = 0;
      player.stamina = player.maxStamina;
      score = 0; wave = 1;
      gameActive = true; gameOver = false;
      enemies = []; projectiles = []; groundItems = [];
      inventory.clear();
      inventory.set(0, 2);
      startWave();
      updateUI();
      updateCamera();
      closeInventory();
    }
    
    function updateUI() {
      hpSpan.textContent = player.health;
      scoreSpan.textContent = score;
      weaponSpan.textContent = weapons[player.weapon].name;
      waveSpan.textContent = wave;
      staminaSpan.textContent = Math.floor(player.stamina);
    }
    
    // ----- MOVIMENTO E DASH -----
    function handlePlayerMovement() {
      if (!gameActive || gameOver || player.health <= 0) return;
      if (player.stamina < player.maxStamina) player.stamina = Math.min(player.maxStamina, player.stamina + 0.5);
      
      let moveX = 0, moveY = 0;
      if (keys.w || keys.up) moveY -= 1;
      if (keys.s || keys.down) moveY += 1;
      if (keys.a || keys.left) moveX -= 1;
      if (keys.d || keys.right) moveX += 1;
      
      let dashMult = 1;
      if (keys.shift && player.stamina >= 20 && player.dashCooldown <= 0) {
        dashMult = 2.5; player.stamina -= 20; player.dashCooldown = 30;
      }
      if (player.dashCooldown > 0) player.dashCooldown--;
      
      if (moveX !== 0 || moveY !== 0) {
        const len = Math.sqrt(moveX*moveX + moveY*moveY);
        moveX = moveX / len * player.speed * dashMult;
        moveY = moveY / len * player.speed * dashMult;
        if (Math.abs(moveX) > Math.abs(moveY)) player.facing = moveX > 0 ? 'right' : 'left';
        else player.facing = moveY > 0 ? 'down' : 'up';
      }
      if (canMoveTo(player.x + moveX, player.y, player.size, player.size)) player.x += moveX;
      if (canMoveTo(player.x, player.y + moveY, player.size, player.size)) player.y += moveY;
      
      for (let i=groundItems.length-1; i>=0; i--) {
        const g = groundItems[i];
        if (Math.hypot(player.x - g.x, player.y - g.y) < 22) {
          inventory.set(g.itemId, (inventory.get(g.itemId) || 0) + 1);
          groundItems.splice(i,1);
        }
      }
      updateUI();
    }
    
    // ----- ATAQUE -----
    function handleAttack() {
      if (player.attackTimer > 0) player.attackTimer--;
      if (keys.space && player.attackTimer <= 0 && gameActive && !gameOver && player.health > 0) {
        const weapon = weapons[player.weapon];
        player.attackTimer = weapon.cooldown;
        
        if (weapon.type === 'melee') {
          let ax = player.x, ay = player.y;
          const range = weapon.range;
          if (player.facing === 'right') ax += range/2;
          if (player.facing === 'left') ax -= range/2;
          if (player.facing === 'down') ay += range/2;
          if (player.facing === 'up') ay -= range/2;
          
          for (let e of enemies) {
            if (Math.hypot(e.x - ax, e.y - ay) < range) {
              e.health -= weapon.damage;
              if (e.health <= 0) {
                enemies.splice(enemies.indexOf(e), 1);
                score += 10;
                updateUI();
                checkWaveComplete();
              }
            }
          }
        } else {
          const proj = {
            x: player.x, y: player.y, vx: 0, vy: 0,
            damage: weapon.damage, life: 80, type: weapon.projectile, owner: 'player'
          };
          const spd = 8;
          if (player.facing === 'right') proj.vx = spd;
          else if (player.facing === 'left') proj.vx = -spd;
          else if (player.facing === 'down') proj.vy = spd;
          else proj.vy = -spd;
          projectiles.push(proj);
        }
      }
    }
    
    // ----- IA INIMIGOS (INTELIGENTE) -----
    function updateEnemies() {
      for (let e of enemies) {
        // Cooldown de ataque
        if (e.attackCooldown > 0) e.attackCooldown--;
        
        // Comportamento por AI
        const dx = player.x - e.x, dy = player.y - e.y, dist = Math.hypot(dx, dy);
        
        if (e.ai === 'basic' || e.ai === 'flank') {
          // Movimento aleatório com perseguição leve
          if (Math.random() < 0.6) {
            e.vx = (Math.random()-0.5) * e.speed * 1.5;
            e.vy = (Math.random()-0.5) * e.speed * 1.5;
          } else if (dist > 5) {
            e.vx = dx/dist * e.speed * 0.8;
            e.vy = dy/dist * e.speed * 0.8;
          }
        } else if (e.ai === 'chase' || e.ai === 'boss') {
          // Perseguição direta, desviando de projéteis
          if (dist > 60) {
            e.vx = dx/dist * e.speed;
            e.vy = dy/dist * e.speed;
          } else {
            // Manter distância para atacar
            const angle = Math.atan2(dy, dx);
            e.vx = -Math.cos(angle) * e.speed * 0.5;
            e.vy = -Math.sin(angle) * e.speed * 0.5;
          }
        } else if (e.ai === 'ranged') {
          // Manter distância e atirar
          const desiredDist = 150;
          if (dist > desiredDist + 20) {
            e.vx = dx/dist * e.speed;
            e.vy = dy/dist * e.speed;
          } else if (dist < desiredDist - 20) {
            e.vx = -dx/dist * e.speed;
            e.vy = -dy/dist * e.speed;
          }
          // Atacar se estiver na linha de visão
          if (dist < 300 && e.attackCooldown <= 0) {
            const proj = {
              x: e.x, y: e.y, vx: 0, vy: 0, damage: e.damage,
              life: 70, type: e.projectile, owner: 'enemy'
            };
            const spd = 6;
            if (Math.abs(dx) > Math.abs(dy)) proj.vx = dx > 0 ? spd : -spd;
            else proj.vy = dy > 0 ? spd : -spd;
            projectiles.push(proj);
            e.attackCooldown = 40;
          }
        }
        
        // Aplica movimento com colisão
        if (canMoveTo(e.x + e.vx, e.y, e.size, e.size)) e.x += e.vx;
        if (canMoveTo(e.x, e.y + e.vy, e.size, e.size)) e.y += e.vy;
        
        // Dano ao jogador (corpo a corpo)
        if (gameActive && !gameOver && player.invincible <= 0 && dist < e.size/2 + 12) {
          const rawDamage = e.damage;
          const mitigated = rawDamage * player.armor;
          player.health = Math.max(0, player.health - Math.floor(mitigated));
          player.invincible = 25;
          updateUI();
          if (player.health <= 0) { gameActive = false; gameOver = true; }
        }
      }
      if (player.invincible > 0) player.invincible--;
      
      // Projéteis (player e inimigos)
      for (let i=projectiles.length-1; i>=0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy;
        p.life--;
        if (p.life <= 0 || isTileSolid(Math.floor(p.x/TILE_SIZE), Math.floor(p.y/TILE_SIZE))) {
          projectiles.splice(i,1); continue;
        }
        
        if (p.owner === 'player') {
          for (let e of enemies) {
            if (Math.hypot(p.x - e.x, p.y - e.y) < e.size/2 + 8) {
              e.health -= p.damage;
              projectiles.splice(i,1);
              if (e.health <= 0) {
                enemies.splice(enemies.indexOf(e), 1);
                score += 10;
                updateUI();
                checkWaveComplete();
              }
              break;
            }
          }
        } else if (p.owner === 'enemy') {
          if (Math.hypot(p.x - player.x, p.y - player.y) < player.size/2 + 8) {
            const rawDamage = p.damage;
            player.health = Math.max(0, player.health - Math.floor(rawDamage * player.armor));
            projectiles.splice(i,1);
            updateUI();
            if (player.health <= 0) { gameActive = false; gameOver = true; }
          }
        }
      }
    }
    
    function usePotion() {
      for (let [id, qty] of inventory.entries()) {
        const item = ITEM_DB[id];
        if (item && item.type === 'potion' && qty > 0 && player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + item.heal);
          inventory.set(id, qty - 1);
          if (inventory.get(id) === 0) inventory.delete(id);
          updateUI();
          break;
        }
      }
    }
    
    function switchWeapon(key) {
      const map = { '1': 'sword', '2': 'dagger', '3': 'axe', '4': 'spear', '5': 'longbow', '6': 'staff' };
      if (map[key]) player.weapon = map[key];
      updateUI();
    }
    
    // ----- DESENHO (COM CABELO)-----
    function drawMap() {
      for (let r=0; r<MAP_ROWS; r++) {
        for (let c=0; c<MAP_COLS; c++) {
          const x = c*TILE_SIZE - camera.x, y = r*TILE_SIZE - camera.y;
          ctx.fillStyle = tileMap[r][c] === TILE_GRASS ? '#3a754a' : '#6b5a4e';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        }
      }
    }
    
    function drawPlayer() {
      const px = player.x - camera.x - 16, py = player.y - camera.y - 16;
      // Cabelo
      ctx.fillStyle = playerAppearance.hair;
      ctx.fillRect(px+6, py-8, 20, 10);
      // Corpo
      ctx.fillStyle = playerAppearance.clothes;
      ctx.fillRect(px+8, py+4, 16, 20);
      ctx.fillStyle = playerAppearance.skin;
      ctx.fillRect(px+8, py-4, 16, 12);
      // Olhos
      ctx.fillStyle = '#111';
      if (player.facing === 'right') { ctx.fillRect(px+20, py, 4, 4); ctx.fillRect(px+12, py, 4, 4); }
      else if (player.facing === 'left') { ctx.fillRect(px+8, py, 4, 4); ctx.fillRect(px+16, py, 4, 4); }
      else { ctx.fillRect(px+10, py, 4, 4); ctx.fillRect(px+18, py, 4, 4); }
    }
    
    function drawEnemies() {
      for (let e of enemies) {
        const ex = e.x - camera.x - e.size/2, ey = e.y - camera.y - e.size/2;
        ctx.fillStyle = e.color;
        ctx.fillRect(ex, ey, e.size, e.size);
        ctx.fillStyle = '#000';
        ctx.fillRect(ex+4, ey+4, 4, 4); ctx.fillRect(ex+e.size-8, ey+4, 4, 4);
        const hpPct = e.health / e.maxHealth;
        ctx.fillStyle = '#300'; ctx.fillRect(ex, ey-6, e.size, 4);
        ctx.fillStyle = '#0f0'; ctx.fillRect(ex, ey-6, e.size * hpPct, 4);
      }
    }
    
    function drawProjectiles() {
      for (let p of projectiles) {
        const sx = p.x - camera.x - 4, sy = p.y - camera.y - 4;
        ctx.fillStyle = p.type === 'fireball' ? '#f80' : '#ff0';
        ctx.beginPath(); ctx.arc(sx+4, sy+4, 6, 0, 2*Math.PI); ctx.fill();
      }
    }
    
    function drawVersion() {
      ctx.font = '12px "Courier New", monospace'; ctx.fillStyle = '#aaa';
      ctx.fillText('v0.0.2 alpha', canvas.width - 100, canvas.height - 10);
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMap();
      drawEnemies();
      drawProjectiles();
      drawPlayer();
      if (!gameActive && gameOver) {
        ctx.font = 'bold 24px "Courier New"'; ctx.fillStyle = '#fff';
        ctx.fillText('GAME OVER', 120, 150);
      }
      if (!waveInProgress && gameActive) {
        ctx.font = 'bold 20px "Courier New"'; ctx.fillStyle = '#ffd966';
        ctx.fillText('Próxima wave...', 100, 100);
      }
      drawVersion();
    }
    
    // ----- INVENTÁRIO E MENUS -----
    function renderInventoryGrid() {
      invGrid.innerHTML = '';
      for (let [id, qty] of inventory.entries()) {
        const item = ITEM_DB[id];
        if (!item) continue;
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `<div class="item-icon-canvas"></div><div class="item-name">${item.name}</div><div class="item-count">${qty}</div>`;
        invGrid.appendChild(card);
      }
    }
    function openInventory() { renderInventoryGrid(); inventoryOverlay.style.display = 'flex'; }
    function closeInventory() { inventoryOverlay.style.display = 'none'; }
    
    function showMenu() { mainMenu.style.display = 'flex'; gameActive = false; }
    function hideMenu() { mainMenu.style.display = 'none'; }
    function showClassSelection() {
      const container = document.getElementById('classOptionsContainer');
      container.innerHTML = '';
      Object.entries(CLASSES).forEach(([key, cls]) => {
        const card = document.createElement('div');
        card.className = 'class-card';
        card.dataset.class = key;
        card.innerHTML = `<h3>${cls.name}</h3><p>Vida: ${cls.maxHealth}</p><p>Arma: ${weapons[cls.weapon].name}</p>`;
        card.addEventListener('click', () => {
          document.querySelectorAll('.class-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          playerClass = key;
        });
        container.appendChild(card);
      });
      classSelection.style.display = 'flex';
      hideMenu();
    }
    
    // Personalização (com cabelo)
    document.querySelectorAll('.color-option').forEach(el => {
      el.addEventListener('click', function() {
        const parent = this.parentNode;
        parent.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
        this.classList.add('selected');
        if (this.dataset.skin) playerAppearance.skin = this.dataset.skin;
        if (this.dataset.clothes) playerAppearance.clothes = this.dataset.clothes;
        if (this.dataset.hair) playerAppearance.hair = this.dataset.hair;
      });
    });
    document.querySelector('[data-skin="#f0d0a0"]').classList.add('selected');
    document.querySelector('[data-clothes="#3a6ea5"]').classList.add('selected');
    document.querySelector('[data-hair="#3a2a1a"]').classList.add('selected');
    
    document.getElementById('customizeBtn').addEventListener('click', () => customizePanel.style.display = 'block');
    document.getElementById('saveCustomizeBtn').addEventListener('click', () => customizePanel.style.display = 'none');
    document.getElementById('startGameBtn').addEventListener('click', showClassSelection);
    document.getElementById('confirmClassBtn').addEventListener('click', () => {
      classSelection.style.display = 'none';
      resetGame();
    });
    document.getElementById('creditsBtn').addEventListener('click', () => alert('Roguelike IA Avançada · v0.0.2'));
    
    // Teclado
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') keys.up = true;
      if (k === 's' || k === 'arrowdown') keys.down = true;
      if (k === 'a' || k === 'arrowleft') keys.left = true;
      if (k === 'd' || k === 'arrowright') keys.right = true;
      if (k === ' ') { keys.space = true; e.preventDefault(); }
      if (k === 'e') { keys.e = true; e.preventDefault(); }
      if (k === 'shift') { keys.shift = true; e.preventDefault(); }
      if (k >= '1' && k <= '6') switchWeapon(k);
      if (['arrowup','arrowdown','arrowleft','arrowright',' ', 'e', 'shift'].includes(k)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') keys.up = false;
      if (k === 's' || k === 'arrowdown') keys.down = false;
      if (k === 'a' || k === 'arrowleft') keys.left = false;
      if (k === 'd' || k === 'arrowright') keys.right = false;
      if (k === ' ') keys.space = false;
      if (k === 'e') keys.e = false;
      if (k === 'shift') keys.shift = false;
    });
    
    document.getElementById('inventoryBtn').addEventListener('click', openInventory);
    document.getElementById('menuBtn').addEventListener('click', showMenu);
    document.getElementById('closeInvBtn').addEventListener('click', closeInventory);
    inventoryOverlay.addEventListener('click', (e) => { if (e.target === inventoryOverlay) closeInventory(); });
    
    showMenu();
    
    function gameLoop() {
      if (gameActive) {
        handlePlayerMovement();
        handleAttack();
        updateEnemies();
        updateCamera();
        if (keys.e) { usePotion(); keys.e = false; }
      }
      draw();
      requestAnimationFrame(gameLoop);
    }
    gameLoop();
  })();
</script>
